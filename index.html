<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Qujat — документы, налоги, ИИ онлайн</title>
<meta name="description" content="Бухгалтерия Казахстана онлайн: создавайте счёт, акт, накладную, считайте налоги 2026 и спрашивайте ИИ-помощника — прямо в браузере, бесплатно.">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6f9;
  --bg-soft:#fbfbfc;
  --card:#ffffff;
  --surface-2:#fbfbfe;
  --text:#0d0f14;
  --text-2:#3d4453;
  --muted:#7b818f;
  --muted-2:#9aa0ac;
  --accent:#5b54e6;
  --accent-ink:#4f47df;
  --accent-strong:#4a43d6;
  --accent-deep:#3f38c2;
  --accent-soft:#efeefc;
  --accent-soft2:#e4e1fb;
  --accent-tint:#f6f5ff;
  --accent2:#0fb886;
  --accent2-soft:#e6f7f1;
  --grad:linear-gradient(135deg,#7a5cff 0%,#6244ec 52%,#5a3fdb 100%);
  --grad-soft:linear-gradient(155deg,#f4f1ff 0%,#e9e5ff 100%);
  --line:#e9eaef;
  --line-2:#e1e2e9;
  --line-soft:#f1f2f5;
  --danger:#e5484d;
  --danger-soft:#fdecee;
  --ok:#0a9d6e;
  --ok-soft:#e7f7f0;
  --ok-line:#bfe9d4;
  --radius:18px;
  --radius-lg:20px;
  --radius-sm:13px;
  --radius-xs:11px;
  --sh-xs:0 1px 2px rgba(16,18,28,.04), 0 1px 1px rgba(16,18,28,.03);
  --sh-sm:0 1px 2px rgba(16,18,28,.05), 0 4px 10px rgba(16,18,28,.05);
  --sh-md:0 2px 4px rgba(16,18,28,.05), 0 10px 26px rgba(40,32,90,.08);
  --sh-lg:0 6px 14px rgba(40,32,90,.10), 0 20px 44px rgba(40,32,90,.14);
  --sh-accent:0 4px 12px rgba(91,84,230,.28), 0 12px 30px rgba(91,84,230,.22);
  --sh-accent-soft:0 2px 8px rgba(91,84,230,.14), 0 10px 28px rgba(91,84,230,.12);
  --ring:0 0 0 4px rgba(91,84,230,.13);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
*::selection{background:var(--accent-soft);color:var(--accent-strong)}
body{
  font-family:'Montserrat',-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(120% 70% at 100% -10%,rgba(122,92,255,.07),transparent 55%),
    radial-gradient(120% 60% at 50% -10%,#ffffff 0%,rgba(255,255,255,0) 55%),
    var(--bg);
  background-attachment:fixed;
  color:var(--text);
  line-height:1.5;
  letter-spacing:-.01em;
  font-weight:500;
  padding-bottom:88px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
.wrap{max-width:580px;margin:0 auto;padding:0 18px}

header{
  position:sticky;top:0;z-index:30;
  background:rgba(247,248,251,.74);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-bottom:1px solid var(--line);
}
header .wrap{display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{
  font-size:21px;font-weight:800;letter-spacing:-.03em;
  display:flex;gap:8px;align-items:center;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.logo svg,.logo img{height:26px;width:auto}
.ib{
  height:40px;padding:0 15px;border-radius:13px;
  background:var(--card);border:1px solid var(--line-2);
  font-family:inherit;font-weight:700;font-size:13.5px;letter-spacing:.01em;
  color:var(--text-2);cursor:pointer;
  box-shadow:var(--sh-xs);
  transition:transform .18s var(--ease),box-shadow .18s var(--ease),border-color .18s var(--ease),color .18s var(--ease);
}
.ib:hover{border-color:#d6d7e0;color:var(--text);box-shadow:var(--sh-sm);transform:translateY(-1px)}
.ib:active{transform:translateY(0) scale(.97)}

h2{font-size:25px;font-weight:800;letter-spacing:-.035em;margin:24px 0 5px;line-height:1.15}
.sub{color:var(--muted);font-size:14.5px;font-weight:500;letter-spacing:-.005em;margin-bottom:20px;line-height:1.45}

.card{
  display:flex;align-items:center;gap:14px;
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);padding:15px 16px;margin-bottom:11px;
  cursor:pointer;position:relative;
  box-shadow:var(--sh-xs);
  transition:transform .2s var(--ease),box-shadow .25s var(--ease),border-color .2s var(--ease);
}
.card:hover{
  border-color:rgba(91,84,230,.28);
  transform:translateY(-3px);
  box-shadow:var(--sh-md);
}
.card:active{transform:translateY(-1px) scale(.995)}
.ic{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:23px;
  background:var(--grad-soft);color:var(--accent);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7),inset 0 0 0 1px rgba(91,84,230,.08),0 4px 10px rgba(91,84,230,.10);
  flex:0 0 auto;
}
.card .t{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1.25}
.card .d{font-size:12.5px;font-weight:500;color:var(--muted);letter-spacing:-.005em;margin-top:2px;line-height:1.35}
.chev{
  margin-left:auto;color:var(--muted-2);font-size:20px;font-weight:700;flex:0 0 auto;
  transition:transform .2s var(--ease),color .2s var(--ease);
}
.card:hover .chev{color:var(--accent);transform:translateX(3px)}

.cgh{
  font-size:11.5px;font-weight:800;color:var(--muted);
  letter-spacing:.14em;text-transform:uppercase;margin:26px 4px 11px;
}

.field{margin-bottom:14px}
label{
  display:block;font-size:12.5px;font-weight:700;color:var(--text-2);
  letter-spacing:-.005em;margin:0 0 6px 3px;
}
input[type=text],input[type=number],input[type=date]{
  width:100%;height:48px;
  border:1px solid var(--line-2);border-radius:13px;
  padding:0 14px;font-family:inherit;font-size:15px;font-weight:600;letter-spacing:-.01em;
  background:var(--surface-2);color:var(--text);
  transition:border-color .18s var(--ease),box-shadow .18s var(--ease),background .18s var(--ease);
}
input::placeholder{color:var(--muted-2);font-weight:500}
input[type=text]:hover,input[type=number]:hover,input[type=date]:hover{border-color:#d6d7e0}
input:focus{
  outline:none;border-color:var(--accent);background:var(--card);
  box-shadow:var(--ring);
}

.sec{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);padding:17px 16px;margin-bottom:15px;
  box-shadow:var(--sh-sm);
}
.sec h3{
  font-size:15px;font-weight:800;letter-spacing:-.02em;
  margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--text);
}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

.itemrow{display:grid;grid-template-columns:1fr 50px 82px 32px;gap:8px;margin-bottom:9px;align-items:center}
.itemrow input{height:44px;padding:0 10px;font-size:14px;border-radius:11px}
.del{
  height:44px;border:1px solid var(--danger-soft);background:var(--danger-soft);
  color:var(--danger);border-radius:11px;font-size:17px;cursor:pointer;font-family:inherit;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s var(--ease),transform .12s var(--ease),box-shadow .15s var(--ease);
}
.del:hover{background:#fbdbde;box-shadow:0 2px 8px rgba(229,72,77,.18)}
.del:active{transform:scale(.92)}
.additem{
  width:100%;height:46px;
  border:1.5px dashed rgba(91,84,230,.42);background:var(--grad-soft);color:var(--accent-strong);
  border-radius:13px;font-family:inherit;font-weight:700;font-size:14px;letter-spacing:-.01em;cursor:pointer;
  transition:background .18s var(--ease),border-color .18s var(--ease),box-shadow .18s var(--ease),transform .12s var(--ease);
}
.additem:hover{border-color:var(--accent);box-shadow:0 6px 16px rgba(91,84,230,.14)}
.additem:active{transform:scale(.985)}
.ihead{
  display:grid;grid-template-columns:1fr 50px 82px 32px;gap:8px;
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted-2);margin-bottom:7px;padding:0 4px;
}

details summary{
  cursor:pointer;font-size:13.5px;color:var(--accent);font-weight:700;letter-spacing:-.01em;
  margin-top:6px;list-style:none;display:inline-flex;align-items:center;gap:5px;
  transition:color .15s var(--ease);
}
details summary::-webkit-details-marker{display:none}
details summary::after{content:"\2304";font-size:15px;line-height:1;transition:transform .2s var(--ease)}
details[open] summary::after{transform:rotate(180deg)}
details summary:hover{color:var(--accent-strong)}

.total{
  display:flex;justify-content:space-between;align-items:center;
  font-size:18px;font-weight:800;letter-spacing:-.025em;
  padding:14px;margin-top:4px;border-radius:14px;
  background:var(--grad-soft);
  box-shadow:inset 0 0 0 1px rgba(91,84,230,.10);
}

.chk{
  display:flex;align-items:center;gap:10px;
  font-size:14.5px;font-weight:600;letter-spacing:-.01em;color:var(--text-2);
  cursor:pointer;padding:7px 3px;
}
.chk input{
  width:21px;height:21px;border-radius:7px;accent-color:var(--accent);cursor:pointer;flex:0 0 auto;
}

.btn{
  width:100%;height:54px;
  background:var(--grad);color:#fff;border:none;border-radius:15px;
  font-family:inherit;font-size:16px;font-weight:700;letter-spacing:-.01em;cursor:pointer;
  box-shadow:var(--sh-accent-soft), inset 0 1px 0 rgba(255,255,255,.22);
  transition:transform .16s var(--ease),box-shadow .22s var(--ease),filter .18s var(--ease);
}
.btn:hover{transform:translateY(-2px);box-shadow:var(--sh-accent), inset 0 1px 0 rgba(255,255,255,.25);filter:saturate(1.05)}
.btn:active{transform:translateY(0) scale(.985);box-shadow:var(--sh-accent-soft)}
.btn:disabled{opacity:.55;cursor:not-allowed;box-shadow:none;filter:grayscale(.12);transform:none}
.btn.ghost{
  background:var(--card);color:var(--accent-strong);
  border:1px solid var(--line-2);
  box-shadow:var(--sh-xs);
}
.btn.ghost:hover{border-color:rgba(91,84,230,.4);background:var(--accent-tint);box-shadow:var(--sh-sm);filter:none;transform:none}

.back{
  background:none;border:none;color:var(--muted);
  font-family:inherit;font-size:14.5px;font-weight:700;letter-spacing:-.01em;cursor:pointer;
  padding:16px 0 6px;display:inline-flex;align-items:center;gap:4px;
  transition:color .15s var(--ease),transform .15s var(--ease);
}
.back:hover{color:var(--accent-strong);transform:translateX(-2px)}

.hidden{display:none}

.note{font-size:12.5px;font-weight:500;color:var(--muted);text-align:center;margin:18px 0;line-height:1.6}
.note a{color:var(--accent-strong);font-weight:700;text-decoration:none;border-bottom:1px solid rgba(91,84,230,.25)}
.note a:hover{border-bottom-color:var(--accent)}

.ok{text-align:center;padding:42px 12px;animation:rise .5s var(--ease)}
.ok .em{
  font-size:60px;display:inline-flex;align-items:center;justify-content:center;
  width:104px;height:104px;border-radius:50%;margin-bottom:6px;
  background:var(--ok-soft);box-shadow:0 10px 28px rgba(10,157,110,.18);
  animation:pop .5s var(--ease);
}
.ok h2{margin:16px 0 6px}

.spin{
  display:inline-block;width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;
  animation:sp .7s linear infinite;vertical-align:-3px;margin-right:9px;
}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.6)}60%{transform:scale(1.08)}100%{transform:scale(1)}}

.banner{
  background:linear-gradient(135deg,#eafaf2,var(--ok-soft));
  border:1px solid var(--ok-line);color:#0a7a52;
  border-radius:14px;padding:13px 15px;font-size:13px;font-weight:600;letter-spacing:-.005em;line-height:1.5;
  margin-bottom:18px;box-shadow:0 4px 14px rgba(10,157,110,.08);
}

.rline{
  display:flex;justify-content:space-between;gap:10px;align-items:center;
  padding:13px 4px;border-bottom:1px solid var(--line);
  font-size:15px;font-weight:500;letter-spacing:-.01em;color:var(--text-2);
}
.rline:last-child{border:none}
.rline b{font-weight:800;color:var(--text);letter-spacing:-.02em}

.chat{display:flex;flex-direction:column;gap:11px;padding:10px 0 14px;min-height:50vh}
.msg{
  max-width:86%;padding:12px 15px;border-radius:18px;
  font-size:14.5px;font-weight:500;letter-spacing:-.005em;line-height:1.55;white-space:pre-wrap;
  box-shadow:var(--sh-xs);animation:rise .35s var(--ease);
}
.msg.u{
  background:var(--grad);color:#fff;
  align-self:flex-end;border-bottom-right-radius:6px;
  box-shadow:var(--sh-accent-soft);
}
.msg.a{
  background:var(--card);border:1px solid var(--line);color:var(--text);
  align-self:flex-start;border-bottom-left-radius:6px;
}

.airow{
  position:fixed;bottom:80px;left:0;right:0;z-index:35;
  background:rgba(247,248,251,.84);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-top:1px solid var(--line);padding:11px 0 12px;
}
.airow .wrap{display:flex;gap:9px;align-items:center}
.airow input{flex:1;height:48px;background:var(--card);box-shadow:var(--sh-xs)}
.aisend{
  width:50px;height:48px;border:none;flex:0 0 auto;
  background:var(--grad);color:#fff;border-radius:13px;font-size:19px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--sh-accent-soft);
  transition:transform .14s var(--ease),box-shadow .2s var(--ease),filter .18s var(--ease);
}
.aisend:hover{transform:translateY(-1px);box-shadow:var(--sh-accent);filter:saturate(1.05)}
.aisend:active{transform:scale(.93)}

.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.chip{
  background:var(--card);border:1px solid var(--line-2);border-radius:999px;
  padding:8px 14px;font-family:inherit;font-size:12.5px;font-weight:700;letter-spacing:-.005em;
  cursor:pointer;color:var(--accent-strong);
  box-shadow:var(--sh-xs);
  transition:background .15s var(--ease),border-color .15s var(--ease),box-shadow .15s var(--ease),transform .12s var(--ease);
}
.chip:hover{background:var(--accent-tint);border-color:rgba(91,84,230,.4);box-shadow:var(--sh-sm);transform:translateY(-1px)}
.chip:active{transform:scale(.95)}

.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  height:72px;
  background:rgba(255,255,255,.85);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--line);
  box-shadow:0 -4px 24px rgba(40,32,90,.06);
  display:flex;align-items:stretch;
  padding:8px max(8px,env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom,0px)) max(8px,env(safe-area-inset-right));
}
.nav button{
  position:relative;flex:1;background:none;border:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--muted);font-family:inherit;font-size:21px;cursor:pointer;
  border-radius:14px;
  transition:color .2s var(--ease),background .2s var(--ease),transform .14s var(--ease);
}
.nav button::after{
  content:"";position:absolute;top:-1px;left:50%;transform:translateX(-50%) scaleX(0);
  width:28px;height:3px;border-radius:0 0 4px 4px;background:var(--grad);
  transition:transform .26s var(--ease);
}
.nav button:active{transform:scale(.93)}
.nav button.active{color:var(--accent);background:var(--accent-tint)}
.nav button.active::after{transform:translateX(-50%) scaleX(1)}
.nav button.active .nl{color:var(--accent-strong)}
.nav .nl{font-size:10.5px;font-weight:700;letter-spacing:.01em;color:inherit}
/* ===== Десктоп: төмендегі нав → сол жақ sidebar ===== */
@media(min-width:900px){
  body{padding-bottom:0;padding-left:252px}
  .wrap{max-width:680px}
  header .wrap, .airow .wrap{max-width:680px}
  .nav{
    flex-direction:column;top:0;bottom:0;left:0;right:auto;
    width:252px;height:100vh;align-items:stretch;justify-content:flex-start;
    border-top:none;border-right:1px solid var(--line);
    box-shadow:1px 0 24px rgba(40,32,90,.05);gap:6px;
    padding:78px 16px 18px;background:rgba(255,255,255,.94);
  }
  .nav button{
    flex:0 0 auto;flex-direction:row;justify-content:flex-start;gap:14px;
    height:50px;width:100%;border-radius:13px;padding:0 15px;font-size:20px;
  }
  .nav button:hover{background:var(--accent-tint)}
  .nav button::after{display:none}
  .nav button.active{background:var(--accent-soft)}
  .nav .nl{font-size:14.5px}
  .airow{left:252px;bottom:0}
  #tab-ai{padding-bottom:94px}
}
</style>
</head>
<body>
<header><div class="wrap">
  <div class="logo">📄 Qujat</div>
  <button class="ib" id="langbtn" onclick="toggleLang()">🌐 RU</button>
</div></header>

<div class="wrap">
  <!-- ===== TAB: DOCUMENTS ===== -->
  <div id="tab-docs">
    <div id="home">
      <h2 id="h-title"></h2><p class="sub" id="h-sub"></p>
      <div class="banner" id="h-banner"></div>
      <div id="cats"></div>
    </div>
    <div id="form" class="hidden">
      <button class="back" onclick="goDocsHome()">‹ <span id="f-back"></span></button>
      <h2 id="f-title"></h2><p class="sub" id="f-sub"></p>
      <div class="sec">
        <h3>🏢 <span id="s-seller"></span></h3>
        <div class="field"><label id="l-sname"></label><input type="text" id="s_name"></div>
        <div class="row2">
          <div class="field"><label id="l-sbin"></label><input type="text" id="s_bin" inputmode="numeric"></div>
          <div class="field"><label id="l-sfio"></label><input type="text" id="s_fio"></div>
        </div>
        <details><summary id="s-bank"></summary><div style="margin-top:10px">
          <div class="field"><label id="l-bank"></label><input type="text" id="s_bank_name"></div>
          <div class="row2">
            <div class="field"><label>ИИК (IBAN)</label><input type="text" id="s_iik"></div>
            <div class="field"><label>БИК</label><input type="text" id="s_bik"></div>
          </div>
          <div class="field"><label id="l-kaspi"></label><input type="text" id="s_kaspi_link" placeholder="https://pay.kaspi.kz/pay/..."></div>
        </div></details>
      </div>
      <div class="sec">
        <h3>👤 <span id="s-buyer"></span></h3>
        <div class="field"><label id="l-bname"></label><input type="text" id="b_name"></div>
        <div class="field"><label id="l-bbin"></label><input type="text" id="b_bin" inputmode="numeric"></div>
      </div>
      <div class="sec"><div class="row2">
        <div class="field"><label id="l-num"></label><input type="text" id="d_number" value="1"></div>
        <div class="field"><label id="l-date"></label><input type="date" id="d_date"></div>
      </div></div>
      <div class="sec">
        <h3>📋 <span id="s-items"></span></h3>
        <div class="ihead"><span id="ih-name"></span><span id="ih-unit"></span><span id="ih-qty"></span><span></span></div>
        <div id="items"></div>
        <button class="additem" onclick="addItem()" id="b-additem"></button>
        <label class="chk" style="margin-top:10px"><input type="checkbox" id="d_vat"><span id="l-vat"></span></label>
        <div class="total"><span id="l-total"></span><span id="total">0 ₸</span></div>
      </div>
      <button class="btn" id="genbtn" onclick="generate()"></button>
      <p class="note" id="f-note"></p>
    </div>
    <div id="result" class="hidden"><div class="ok">
      <div class="em">✅</div><h2 id="r-title"></h2><p class="sub" id="r-sub"></p>
      <a class="btn" id="r-open" target="_blank" style="display:block;text-decoration:none;line-height:50px;margin-bottom:10px"></a>
      <a class="btn ghost" id="r-download" style="display:block;text-decoration:none;line-height:48px;margin-bottom:10px"></a>
      <button class="btn ghost" onclick="goDocsHome()" id="r-new"></button>

      if(name)items.push({name,unit:defUnit(),qty,price});});
    if(!items.length){alert(s.erritems);return;}
    const seller={name:val('s_name'),bin:val('s_bin'),fio:val('s_fio'),bank_name:val('s_bank_name'),iik:val('s_iik'),bik:val('s_bik'),kaspi_link:val('s_kaspi_link')};
    localStorage.setItem('qujat_seller',JSON.stringify(seller));
    const payload={doc:curDoc,number:val('d_number'),date:fmtDate(),vat:$('d_vat').checked,seller,buyer:{name:val('b_name'),bin:val('b_bin')},items};
    const btn=$('genbtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>'+s.genwait;
    try{
      const res=await fetch(API+'/api/generate',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!res.ok)throw new Error('http');
      const blob=await res.blob();if(lastUrl)URL.revokeObjectURL(lastUrl);lastUrl=URL.createObjectURL(blob);
      const fn=curDoc+'_'+(val('d_number')||'1')+'.pdf';$('r-open').href=lastUrl;$('r-download').href=lastUrl;$('r-download').setAttribute('download',fn);
      $('form').classList.add('hidden');$('result').classList.remove('hidden');window.scrollTo(0,0);
    }catch(e){alert(s.errnet);}finally{btn.disabled=false;btn.textContent=s.gen;}
  }

  /* ---------- CALCULATORS ---------- */
  async function loadCalc(){
    try{const r=await fetch(API+'/api/calc-catalog');calcList=(await r.json()).calc||[];}catch(e){calcList=[];}
    renderCalcHome();
  }
  function renderCalcHome(){
    const s=S();$('c-title').textContent=s.ctitle;$('c-sub').textContent=s.csub;$('c-back').textContent=s.back;
    const box=$('calc-list');box.innerHTML='';
    calcList.forEach(c=>{const el=document.createElement('div');el.className='card';
      el.innerHTML='<div class="ic">'+c.icon+'</div><div><div class="t">'+c[lang]+'</div></div><div class="chev">›</div>';
      el.onclick=()=>openCalc(c);box.appendChild(el);});
    $('calc-home').classList.remove('hidden');$('calc-form').classList.add('hidden');
  }
  function openCalc(c){
    curCalc=c;$('cf-title').textContent=c[lang];$('c-run').textContent=S().crun;
    const box=$('cf-fields');box.innerHTML='';
    c.fields.forEach(f=>{const d=document.createElement('div');d.className='field';
      d.innerHTML='<label>'+f[lang]+'</label><input type="number" inputmode="decimal" data-k="'+f.k+'">';box.appendChild(d);});
    $('cf-result').classList.add('hidden');
    $('calc-home').classList.add('hidden');$('calc-form').classList.remove('hidden');window.scrollTo(0,0);
  }
  function goCalcHome(){$('calc-form').classList.add('hidden');$('calc-home').classList.remove('hidden');window.scrollTo(0,0);}
  async function runCalc(){
    const params={};document.querySelectorAll('#cf-fields input').forEach(i=>{params[i.dataset.k]=i.value;});
    const btn=$('c-run');btn.disabled=true;
    try{
      const r=await fetch(API+'/api/calc',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:curCalc.type,lang,params})});
      const d=await r.json();const box=$('cf-result');
      box.innerHTML='<h3 style="margin-bottom:8px">'+S().cresult+'</h3>'+
        d.lines.map(l=>'<div class="rline"><span>'+l[0]+'</span><b>'+l[1]+'</b></div>').join('')+
        (d.note?'<p class="note" style="text-align:left;margin:10px 0 0">'+d.note+'</p>':'');
      box.classList.remove('hidden');
    }catch(e){alert(S().errnet);}finally{btn.disabled=false;}
  }

  /* ---------- AI ---------- */
  function bubble(role,text){const m=document.createElement('div');m.className='msg '+(role==='user'?'u':'a');m.textContent=text;$('chat').appendChild(m);
    window.scrollTo(0,document.body.scrollHeight);return m;}
  function aiGreet(){
    const s=S();$('a-title').textContent=s.atitle;$('a-sub').textContent=s.asub;$('ai-input').placeholder=s.aplaceholder;
    $('chat').innerHTML='';aiHist=[];bubble('assistant',s.agreet);
    const ch=$('a-chips');ch.innerHTML='';
    s.achips.forEach(q=>{const b=document.createElement('div');b.className='chip';b.textContent=q;b.onclick=()=>{$('ai-input').value=q;sendAI();};ch.appendChild(b);});
  }
  async function sendAI(){
    const inp=$('ai-input');const text=inp.value.trim();if(!text)return;inp.value='';
    bubble('user',text);aiHist.push({role:'user',content:text});
    const wait=bubble('assistant','…');
    try{
      const r=await fetch(API+'/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,lang,history:aiHist.slice(-6)})});
      const d=await r.json();wait.textContent=d.reply||S().errnet;aiHist.push({role:'assistant',content:d.reply||''});
    }catch(e){wait.textContent=S().errnet;}
    window.scrollTo(0,document.body.scrollHeight);
  }
  document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement===$('ai-input'))sendAI();});

  /* ---------- ACCOUNT (email+пароль) ---------- */
  let meUser=null;
  const reEmail=/^[^@\s]+@[^@\s]+\.[^@\s]+$/;
  function accLabels(){
    const s=S();
    $('acc-intro').textContent=s.accintro;
    $('la-name').textContent=s.accname;$('la-email-r').textContent=s.accemail;$('la-pass-r').textContent=s.accpass;
    $('la-email-l').textContent=s.accemail;$('la-pass-l').textContent=s.accpass;
    $('a-regbtn').textContent=s.accregbtn;$('a-loginbtn').textContent=s.accloginbtn;
    $('a-to-login').textContent=s.acctologin;$('a-to-reg').textContent=s.acctoreg;
    $('a-logout').textContent=s.acclogout;$('acc-welcome').textContent=s.accwelcome;
    $('acc-hist-t').textContent=s.acchist;$('acc-chpass-t').textContent=s.accchpass;
    $('la-old').textContent=s.accold;$('la-new').textContent=s.accnew;$('a-chpass').textContent=s.accsave;
    $('a-delete').textContent=s.accdelete;$('a-forgot').textContent=s.forgot;
    $('acc-link-t').textContent=s.linktg;$('acc-link-hint').textContent=s.linkhint;$('a-linkbtn').textContent=s.linkbtn;
    $('acc-admin-t').textContent=s.adminp;$('reset-h').textContent=s.resettitle;$('reset-sub').textContent=s.resetsub;
    $('la-reset').textContent=s.accnew;$('a-resetbtn').textContent=s.resetbtn;
  }
  function acctab(w){$('acc-reg').classList.toggle('hidden',w!=='reg');$('acc-login').classList.toggle('hidden',w!=='login');}
  function renderAccount(){
    accLabels();
    if(resetTok){$('acc-reset').classList.remove('hidden');$('acc-auth').classList.add('hidden');$('acc-user').classList.add('hidden');return;}
    $('acc-reset').classList.add('hidden');
    if(meUser){$('acc-user').classList.remove('hidden');$('acc-auth').classList.add('hidden');
      $('acc-name').textContent=meUser.name||'';$('acc-email').textContent=meUser.email||'';
      const linked=!!meUser.telegram_id;
      $('acc-link-form').classList.toggle('hidden',linked);
      const st=$('acc-link-status');st.classList.toggle('hidden',!linked);
      if(linked)st.textContent=S().linkedlbl+(meUser.premium?' · '+S().premon:'');
      const isAdmin=meUser.role==='admin';$('acc-admin').classList.toggle('hidden',!isAdmin);if(isAdmin)loadAdmin();
      loadHistory();}
    else{$('acc-auth').classList.remove('hidden');$('acc-user').classList.add('hidden');acctab('reg');}
  }
  async function loadHistory(){
    const box=$('acc-history');if(!box)return;
    try{const r=await fetch(API+'/api/history',{credentials:'include'});const docs=(await r.json()).docs||[];
      if(!docs.length){box.innerHTML='<p class="sub" style="margin:0">'+S().accnohist+'</p>';return;}
      box.innerHTML=docs.map(d=>'<div class="rline"><span>'+d.title+'<br><span style="color:var(--muted);font-size:12px">'+d.created+' · '+(d.total||0).toLocaleString('ru-RU')+' ₸</span></span>'+
        '<a style="cursor:pointer;color:var(--accent);font-weight:700;white-space:nowrap" onclick="repeatDoc('+d.id+')">'+S().accrepeat+'</a></div>').join('');
    }catch(e){box.innerHTML='';}
  }
  async function repeatDoc(id){
    try{const r=await fetch(API+'/api/history-item?id='+id,{credentials:'include'});const p=(await r.json()).payload;
      if(p&&p.doc){showTab('docs');openFormWith(p);}}catch(e){}
  }
  async function doChangePass(){
    const s=S(),old=$('cp_old').value,nw=$('cp_new').value;
    if(nw.length<6)return alert(s.e_pass);
    const b=$('a-chpass');b.disabled=true;
    try{const r=await fetch(API+'/auth/change-password',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_password:old,new_password:nw})});
      if(r.status===401){alert(s.e_creds);return;}if(!r.ok){alert(s.errnet);return;}
      $('cp_old').value='';$('cp_new').value='';alert(s.accpassok);
    }catch(e){alert(s.errnet);}finally{b.disabled=false;}
  }
  async function doDelete(){
    if(!confirm(S().accdelconfirm))return;
    try{await fetch(API+'/auth/delete',{method:'POST',credentials:'include'});}catch(e){}
    meUser=null;renderAccount();
  }
  let resetTok=new URLSearchParams(location.search).get('reset')||'';
  async function doForgot(){
    const s=S();const email=prompt(s.forgotask,$('al_email').value||'');
    if(!email||!reEmail.test(email.trim().toLowerCase()))return;
    try{await fetch(API+'/auth/forgot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.trim().toLowerCase()})});}catch(e){}
    alert(s.forgotsent);
  }
  async function doReset(){
    const s=S();const pass=$('rs_pass').value;if(pass.length<6)return alert(s.e_pass);
    const b=$('a-resetbtn');b.disabled=true;
    try{const r=await fetch(API+'/auth/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:resetTok,new_password:pass})});
      if(!r.ok){alert(s.resetbad);return;}
      alert(s.resetok);resetTok='';history.replaceState(null,'',location.pathname);renderAccount();acctab('login');
    }catch(e){alert(s.errnet);}finally{b.disabled=false;}
  }
  async function doLinkTg(){
    const s=S();const code=$('lt_code').value.trim();if(!code)return;
    const b=$('a-linkbtn');b.disabled=true;
    try{const r=await fetch(API+'/auth/link-telegram',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
      if(!r.ok){alert(s.linkbad);return;}
      $('lt_code').value='';alert(s.linkok);await loadMe();
    }catch(e){alert(s.errnet);}finally{b.disabled=false;}
  }
  async function loadAdmin(){
    const box=$('admin-users');if(!box)return;
    try{const r=await fetch(API+'/api/admin/users',{credentials:'include'});const us=(await r.json()).users||[];
      box.innerHTML=us.map(u=>'<div class="rline"><span>'+u.email+'<br><span style="color:var(--muted);font-size:12px">'+(u.name||'')+'</span></span>'+
        '<select onchange="setUserRole('+u.id+',this.value)" style="border:1px solid var(--line);border-radius:8px;height:32px;background:var(--card);color:var(--text)">'+
        ['client','manager','admin'].map(rr=>'<option value="'+rr+'"'+(u.role===rr?' selected':'')+'>'+rr+'</option>').join('')+'</select></div>').join('');
    }catch(e){box.innerHTML='';}
  }
  async function setUserRole(id,role){
    try{await fetch(API+'/api/admin/set-role',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,role})});}catch(e){}
  }
  async function loadMe(){
    try{const r=await fetch(API+'/auth/me',{credentials:'include'});meUser=(await r.json()).user;}catch(e){meUser=null;}
    renderAccount();
  }
  async function doRegister(){
    const s=S(),name=$('a_name').value.trim(),email=$('ar_email').value.trim().toLowerCase(),pass=$('ar_pass').value;
    if(name.length<2)return alert(s.e_name);if(!reEmail.test(email))return alert(s.e_email);if(pass.length<6)return alert(s.e_pass);
    const b=$('a-regbtn');b.disabled=true;
    try{const r=await fetch(API+'/auth/register-email',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass,name})});
      if(r.status===409){alert(s.e_taken);return;}if(!r.ok){alert(s.errnet);return;}await loadMe();
    }catch(e){alert(s.errnet);}finally{b.disabled=false;}
  }
  async function doLogin(){
    const s=S(),email=$('al_email').value.trim().toLowerCase(),pass=$('al_pass').value;
    if(!reEmail.test(email))return alert(s.e_email);if(!pass)return alert(s.e_pass);
    const b=$('a-loginbtn');b.disabled=true;
    try{const r=await fetch(API+'/auth/login',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
      if(r.status===401){alert(s.e_creds);return;}if(!r.ok){alert(s.errnet);return;}await loadMe();
    }catch(e){alert(s.errnet);}finally{b.disabled=false;}
  }
  async function doLogout(){try{await fetch(API+'/auth/logout',{method:'POST',credentials:'include'});}catch(e){}meUser=null;renderAccount();}

  /* ---------- CONVERTER ---------- */
  const CONV=[
    {target:"ocr",icon:"🔎",ru:["OCR — скан/фото → текст","Распознать текст (ИИ) → Word"],kz:["OCR — скан/фото → мәтін","Мәтінді тану (AI) → Word"],accept:"application/pdf,image/*",multi:false},
    {target:"pdf2word",icon:"📝",ru:["PDF → Word","Редактируемый .docx (текст)"],kz:["PDF → Word",".docx (мәтін)"],accept:"application/pdf",multi:false},
    {target:"pdf2excel",icon:"📊",ru:["PDF → Excel","Текст PDF в таблицу .xlsx"],kz:["PDF → Excel","Кесте .xlsx"],accept:"application/pdf",multi:false},
    {target:"pdf2jpg",icon:"🖼️",ru:["PDF → JPG","Каждая страница — картинка (zip)"],kz:["PDF → JPG","Әр бет — сурет (zip)"],accept:"application/pdf",multi:false},
    {target:"word2pdf",icon:"📄",ru:["Word → PDF",".docx → PDF"],kz:["Word → PDF",".docx → PDF"],accept:".docx",multi:false},
    {target:"excel2pdf",icon:"📄",ru:["Excel → PDF","Таблица .xlsx → PDF"],kz:["Excel → PDF","Кесте → PDF"],accept:".xlsx,.xls",multi:false},
    {target:"merge",icon:"📑",ru:["Объединить PDF","Несколько PDF в один файл"],kz:["PDF біріктіру","Бірнеше PDF-ті бірге"],accept:"application/pdf",multi:true},
    {target:"splitpdf",icon:"✂️",ru:["Разделить PDF","Каждая страница — отдельный PDF (zip)"],kz:["PDF бөлу","Әр бет бөлек (zip)"],accept:"application/pdf",multi:false},
    {target:"compresspdf",icon:"🗜️",ru:["Сжать PDF","Уменьшить размер файла"],kz:["PDF сығу","Көлемін азайту"],accept:"application/pdf",multi:false},
    {target:"rotatepdf",icon:"🔄",ru:["Повернуть PDF","На 90° по часовой"],kz:["PDF бұру","90° сағат тілімен"],accept:"application/pdf",multi:false},
    {target:"protect",icon:"🔒",ru:["Поставить пароль на PDF","Защитить PDF"],kz:["PDF-ке пароль қою","Қорғау"],accept:"application/pdf",multi:false,param:"password"},
    {target:"unlock",icon:"🔓",ru:["Снять пароль с PDF","Убрать защиту"],kz:["PDF паролін алу","Қорғауды алу"],accept:"application/pdf",multi:false,param:"password"},
    {target:"watermark",icon:"💧",ru:["Водяной знак на PDF","Текст по диагонали"],kz:["PDF-ке су белгісі","Қиғаш мәтін"],accept:"application/pdf",multi:false,param:"text"},
    {target:"addpagenum",icon:"#️⃣",ru:["Номера страниц","Добавить нумерацию"],kz:["Бет нөмірлері","Нөмірлеу қосу"],accept:"application/pdf",multi:false},
    {target:"delpages",icon:"🗑️",ru:["Удалить страницы","напр. 2,4-5"],kz:["Беттерді өшіру","мыс. 2,4-5"],accept:"application/pdf",multi:false,param:"range"},
    {target:"images2pdf",icon:"🖼️",ru:["Фото/картинки → PDF","Несколько изображений в один PDF"],kz:["Фото/сурет → PDF","Бір PDF-ке"],accept:"image/*",multi:true},
    {target:"img2jpg",icon:"🏞️",ru:["Картинка → JPG","PNG, WEBP, BMP… → JPG"],kz:["Сурет → JPG","PNG, WEBP… → JPG"],accept:"image/*",multi:false},
    {target:"img2png",icon:"🏞️",ru:["Картинка → PNG","JPG, WEBP… → PNG"],kz:["Сурет → PNG","JPG… → PNG"],accept:"image/*",multi:false},
    {target:"excel2csv",icon:"📈",ru:["Excel → CSV","XLSX → CSV"],kz:["Excel → CSV","XLSX → CSV"],accept:".xlsx,.xls",multi:false},
    {target:"csv2excel",icon:"📈",ru:["CSV → Excel","CSV → XLSX"],kz:["CSV → Excel","CSV → XLSX"],accept:".csv,text/csv",multi:false}
  ];
  const CONV_EXT={ocr:"docx",pdf2word:"docx",pdf2excel:"xlsx",pdf2jpg:"zip",word2pdf:"pdf",excel2pdf:"pdf",merge:"pdf",splitpdf:"zip",compresspdf:"pdf",rotatepdf:"pdf",protect:"pdf",unlock:"pdf",watermark:"pdf",addpagenum:"pdf",delpages:"pdf",images2pdf:"pdf",img2jpg:"jpg",img2png:"png",excel2csv:"csv",csv2excel:"xlsx"};
  let convTarget=null,convParam="";
  const CGROUPS=[
    {ru:"🔄 Конвертация",kz:"🔄 Конвертация",keys:["ocr","pdf2word","pdf2excel","pdf2jpg","word2pdf","excel2pdf"]},
    {ru:"🛠 PDF-инструменты",kz:"🛠 PDF құралдары",keys:["merge","splitpdf","compresspdf","rotatepdf","protect","unlock","watermark","addpagenum","delpages"]},
    {ru:"🖼 Изображения",kz:"🖼 Суреттер",keys:["images2pdf","img2jpg","img2png"]},
    {ru:"📊 Таблицы",kz:"📊 Кестелер",keys:["excel2csv","csv2excel"]}
  ];
  function convClick(c){
    convTarget=c;convParam='';
    if(c.param){
      const ru=lang==='ru';
      const msg=c.param==='password'?(ru?'Введите пароль:':'Парольді енгізіңіз:'):
                c.param==='range'?(ru?'Какие страницы удалить? напр. 2,4-5':'Қай беттерді өшіру? мыс. 2,4-5'):
                (ru?'Текст водяного знака:':'Су белгісінің мәтіні:');
      const v=prompt(msg,c.param==='text'?'КОПИЯ':'');
      if(v===null)return;convParam=v;
    }
    const inp=$('conv-input');inp.accept=c.accept;inp.multiple=!!c.multi;inp.value='';inp.click();
  }
  function renderConvert(){
    $('conv-title').textContent=S().convtitle;$('conv-sub').textContent=S().convsub;$('conv-status').textContent='';
    const box=$('conv-list');box.innerHTML='';
    CGROUPS.forEach((g,gi)=>{
      const h=document.createElement('div');h.className='cgh';if(gi===0)h.style.marginTop='4px';h.textContent=g[lang];box.appendChild(h);
      g.keys.forEach(k=>{const c=CONV.find(x=>x.target===k);if(!c)return;const[t,d]=c[lang];
        const el=document.createElement('div');el.className='card';
        el.innerHTML='<div class="ic">'+c.icon+'</div><div><div class="t">'+t+'</div><div class="d">'+d+'</div></div><div class="chev">›</div>';
        el.onclick=()=>convClick(c);box.appendChild(el);});
    });
  }
  async function onConvFiles(){
    const inp=$('conv-input');if(!inp.files.length||!convTarget)return;
    const s=S();const fd=new FormData();
    for(const f of inp.files)fd.append('file',f);
    fd.append('target',convTarget.target);
    if(convParam)fd.append('param',convParam);
    $('conv-status').textContent='⏳ '+s.convwait;
    try{
      const r=await fetch(API+'/api/convert',{method:'POST',body:fd});
      if(!r.ok){$('conv-status').textContent='❌ '+s.converr;return;}
      const blob=await r.blob();const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='qujat_converted.'+CONV_EXT[convTarget.target];
      document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),5000);
      $('conv-status').textContent='✅ '+s.convdone;
    }catch(e){$('conv-status').textContent='❌ '+s.converr;}
  }

  function renderAll(){renderHome();docLabels();renderNav();renderAccount();
    if(curTab==='calc'&&calcList.length)renderCalcHome();
    if(curTab==='convert')renderConvert();
    if(curTab==='ai')aiGreet();}
  renderAll();showTab(resetTok?'account':'docs');
</script>
