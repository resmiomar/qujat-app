<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Qujat — вход</title>
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0; url=/auth/">
<link rel="icon" href="/qujat-logo.png">
<style>
  html,body{height:100%;margin:0}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
       background:#f7f8fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;color:#5810E8}
  .wm{font-size:34px;font-weight:800;letter-spacing:-.03em}
  .sp{width:30px;height:30px;border:3px solid #e3d7fc;border-top-color:#5810E8;border-radius:50%;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  a{color:#5810E8;font-weight:700;text-decoration:none;font-size:14px}
</style>
</head>
<body>
  <div class="wm">QUJAT</div>
  <div class="sp"></div>
  <a href="/auth/">Войти →</a>
  <script>
    // Аппқа бірден бағыттаймыз (query/hash сақталады — reset-токен, deep-link, kb=1 жұмыс істеуі үшін).
    location.replace('/auth/' + location.search + location.hash);
  </script>
</body>
</html>
