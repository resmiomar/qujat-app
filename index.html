<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Qujat — создать документ онлайн</title>
<meta name="description" content="Создавайте бухгалтерские документы Казахстана онлайн: счёт, акт, накладная, счёт-фактура. Бесплатно, прямо в браузере, без регистрации.">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{--bg:#f4f5fa;--card:#fff;--text:#14161d;--muted:#8a8f9c;--accent:#6c5ce7;--accent2:#00b894;--line:#eceef3;--danger:#e74c3c}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding-bottom:40px}
  .wrap{max-width:580px;margin:0 auto;padding:0 16px}
  header{position:sticky;top:0;background:rgba(244,245,250,.9);backdrop-filter:blur(10px);z-index:30;border-bottom:1px solid var(--line)}
  header .wrap{display:flex;align-items:center;justify-content:space-between;height:58px}
  .logo{font-size:21px;font-weight:800;display:flex;gap:7px;align-items:center}
  .ib{height:38px;padding:0 12px;border-radius:11px;background:var(--card);border:1px solid var(--line);font-weight:700;font-size:14px;color:var(--text);cursor:pointer}
  h2{font-size:23px;font-weight:800;margin:22px 0 4px}
  .sub{color:var(--muted);font-size:14.5px;margin-bottom:18px}
  .card{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:11px;cursor:pointer;transition:.15s}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 22px rgba(108,92,231,.12)}
  .ic{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:23px;background:#f0eefe;flex:0 0 auto}
  .card .t{font-size:16.5px;font-weight:700}.card .d{font-size:13px;color:var(--muted)}
  .chev{margin-left:auto;color:var(--muted);font-size:22px}
  .field{margin-bottom:12px}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:0 0 5px 3px}
  input[type=text],input[type=number],input[type=date]{width:100%;height:46px;border:1px solid var(--line);border-radius:12px;padding:0 13px;font-size:15px;background:var(--card);color:var(--text)}
  input:focus{outline:none;border-color:var(--accent)}
  .sec{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:14px}
  .sec h3{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:7px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .itemrow{display:grid;grid-template-columns:1fr 50px 82px 30px;gap:7px;margin-bottom:8px;align-items:center}
  .itemrow input{height:42px;padding:0 9px;font-size:14px}
  .del{height:42px;border:none;background:#fdecef;color:var(--danger);border-radius:10px;font-size:18px;cursor:pointer}
  .additem{width:100%;height:44px;border:1px dashed var(--accent);background:#f5f3ff;color:var(--accent);border-radius:12px;font-weight:700;cursor:pointer;font-size:14.5px}
  .ihead{display:grid;grid-template-columns:1fr 50px 82px 30px;gap:7px;font-size:11px;color:var(--muted);margin-bottom:5px;padding:0 3px}
  details summary{cursor:pointer;font-size:14px;color:var(--accent);font-weight:600;margin-top:4px;list-style:none}
  details summary::-webkit-details-marker{display:none}
  .total{display:flex;justify-content:space-between;align-items:center;font-size:17px;font-weight:800;padding:10px 3px}
  .chk{display:flex;align-items:center;gap:9px;font-size:14.5px;color:var(--text);font-weight:600;cursor:pointer;padding:4px 3px}
  .chk input{width:20px;height:20px;accent-color:var(--accent)}
  .btn{width:100%;height:52px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:.15s}
  .btn:hover{box-shadow:0 10px 26px rgba(108,92,231,.35)}
  .btn:disabled{opacity:.6}
  .btn.ghost{background:var(--card);color:var(--accent);border:1px solid var(--line)}
  .back{background:none;border:none;color:var(--muted);font-size:15px;font-weight:600;cursor:pointer;padding:14px 0 4px}
  .hidden{display:none}
  .note{font-size:12.5px;color:var(--muted);text-align:center;margin:18px 0}
  .note a{color:var(--accent);font-weight:600}
  .ok{text-align:center;padding:40px 10px}
  .ok .em{font-size:60px}.ok h2{margin:14px 0 6px}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .banner{background:#eaf6f0;border:1px solid #b6e6cd;color:#0a7a4e;border-radius:12px;padding:10px 13px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<header><div class="wrap">
  <div class="logo">📄 Qujat</div>
  <button class="ib" id="langbtn" onclick="toggleLang()">🌐 RU</button>
</div></header>

<div class="wrap">
  <!-- HOME -->
  <div id="home">
    <h2 id="h-title"></h2>
    <p class="sub" id="h-sub"></p>
    <div class="banner" id="h-banner"></div>
    <div id="cats"></div>
    <p class="note" id="h-note"></p>
  </div>

  <!-- FORM -->
  <div id="form" class="hidden">
    <button class="back" onclick="goHome()">‹ <span id="f-back"></span></button>
    <h2 id="f-title"></h2>
    <p class="sub" id="f-sub"></p>

    <div class="sec">
      <h3>🏢 <span id="s-seller"></span></h3>
      <div class="field"><label id="l-sname"></label><input type="text" id="s_name"></div>
      <div class="row2">
        <div class="field"><label id="l-sbin"></label><input type="text" id="s_bin" inputmode="numeric"></div>
        <div class="field"><label id="l-sfio"></label><input type="text" id="s_fio"></div>
      </div>
      <details>
        <summary id="s-bank"></summary>
        <div style="margin-top:10px">
          <div class="field"><label id="l-bank"></label><input type="text" id="s_bank_name"></div>
          <div class="row2">
            <div class="field"><label>ИИК (IBAN)</label><input type="text" id="s_iik"></div>
            <div class="field"><label>БИК</label><input type="text" id="s_bik"></div>
          </div>
          <div class="field"><label id="l-kaspi"></label><input type="text" id="s_kaspi_link" placeholder="https://pay.kaspi.kz/pay/..."></div>
        </div>
      </details>
    </div>

    <div class="sec">
      <h3>👤 <span id="s-buyer"></span></h3>
      <div class="field"><label id="l-bname"></label><input type="text" id="b_name"></div>
      <div class="field"><label id="l-bbin"></label><input type="text" id="b_bin" inputmode="numeric"></div>
    </div>

    <div class="sec">
      <div class="row2">
        <div class="field"><label id="l-num"></label><input type="text" id="d_number" value="1"></div>
        <div class="field"><label id="l-date"></label><input type="date" id="d_date"></div>
      </div>
    </div>

    <div class="sec">
      <h3>📋 <span id="s-items"></span></h3>
      <div class="ihead"><span id="ih-name"></span><span id="ih-unit"></span><span id="ih-qty"></span><span></span></div>
      <div id="items"></div>
      <button class="additem" onclick="addItem()" id="b-additem"></button>
      <label class="chk" style="margin-top:10px"><input type="checkbox" id="d_vat"><span id="l-vat"></span></label>
      <div class="total"><span id="l-total"></span><span id="total">0 ₸</span></div>
    </div>

    <button class="btn" id="genbtn" onclick="generate()"></button>
    <p class="note" id="f-note"></p>
  </div>

  <!-- RESULT -->
  <div id="result" class="hidden">
    <div class="ok">
      <div class="em">✅</div>
      <h2 id="r-title"></h2>
      <p class="sub" id="r-sub"></p>
      <a class="btn" id="r-open" target="_blank" style="display:block;text-decoration:none;line-height:52px;margin-bottom:10px"></a>
      <a class="btn ghost" id="r-download" style="display:block;text-decoration:none;line-height:50px;margin-bottom:10px"></a>
      <button class="btn ghost" onclick="goHome()" id="r-new"></button>
    </div>
  </div>
</div>

<script>
  const API = 'https://qujat-production.up.railway.app';
  try{ const tg=window.Telegram&&window.Telegram.WebApp; if(tg){tg.ready();tg.expand();} }catch(e){}

  const STR={
    ru:{title:"Создайте документ онлайн",sub:"Бесплатно, прямо в браузере. Без регистрации.",
      banner:"✓ Работает в браузере — заполните форму и скачайте готовый PDF",
      note:'Нужны налоги, учёт, ИИ-помощник и оплата Kaspi? <a href="https://t.me/Qujatkz_bot">Откройте бот →</a>',
      back:"Назад",seller:"Поставщик (вы)",buyer:"Покупатель / клиент",items:"Позиции",
      sname:"Название (ИП/ТОО) *",sbin:"БИН/ИИН",sfio:"ФИО руководителя",bank:"Банковские реквизиты (необязательно)",
      bankname:"Банк",kaspi:"Ссылка Kaspi (для QR)",bname:"Название клиента",bbin:"БИН/ИИН клиента",
      num:"№ документа",date:"Дата",ihname:"Наименование",ihunit:"Кол-во",ihqty:"Цена",
      additem:"+ Добавить позицию",vat:"С НДС 16%",total:"Итого:",gen:"📄 Создать PDF",genwait:"Создаю…",
      fnote:"Данные поставщика сохранятся в этом браузере для следующего раза.",
      itemname:"Наименование",unit:"шт.",
      rtitle:"Документ готов!",rsub:"PDF создан. Откройте или скачайте.",ropen:"👁 Открыть PDF",
      rdownload:"📥 Скачать PDF",rnew:"➕ Создать ещё",
      errseller:"Укажите название поставщика",erritems:"Добавьте хотя бы одну позицию",errnet:"Ошибка сети. Попробуйте ещё раз."},
    kz:{title:"Құжатты онлайн жасаңыз",sub:"Тегін, тікелей браузерде. Тіркелусіз.",
      banner:"✓ Браузерде істейді — форманы толтырып, дайын PDF жүктеңіз",
      note:'Салық, есеп, ИИ-көмекші және Kaspi төлемі керек пе? <a href="https://t.me/Qujatkz_bot">Ботты ашыңыз →</a>',
      back:"Артқа",seller:"Жеткізуші (сіз)",buyer:"Сатып алушы / клиент",items:"Атаулар",
      sname:"Атауы (ЖК/ТОО) *",sbin:"БИН/ЖСН",sfio:"Басшының аты-жөні",bank:"Банк деректемелері (міндетті емес)",
      bankname:"Банк",kaspi:"Kaspi сілтемесі (QR үшін)",bname:"Клиент атауы",bbin:"Клиент БИН/ЖСН",
      num:"Құжат №",date:"Күні",ihname:"Атауы",ihunit:"Саны",ihqty:"Баға",
      additem:"+ Атау қосу",vat:"ҚҚС 16%-бен",total:"Барлығы:",gen:"📄 PDF жасау",genwait:"Жасалуда…",
      fnote:"Жеткізуші деректері келесі жолға осы браузерде сақталады.",
      itemname:"Атауы",unit:"дана",
      rtitle:"Құжат дайын!",rsub:"PDF жасалды. Ашыңыз немесе жүктеңіз.",ropen:"👁 PDF ашу",
      rdownload:"📥 PDF жүктеу",rnew:"➕ Тағы жасау",
      errseller:"Жеткізуші атауын жазыңыз",erritems:"Кемінде бір атау қосыңыз",errnet:"Желі қатесі. Қайталаңыз."}
  };
  const CATS=[
    {key:"invoice",icon:"💵",ru:["Счёт на оплату","Реквизиты, сумма, Kaspi QR"],kz:["Шот (төлеуге)","Деректеме, сома, Kaspi QR"]},
    {key:"act",icon:"📑",ru:["Акт выполненных работ","Услуги, работы"],kz:["Орындалған жұмыс актісі","Қызмет, жұмыс"]},
    {key:"waybill",icon:"📦",ru:["Накладная","Отгрузка товара"],kz:["Жүкқұжат","Тауар жөнелту"]},
    {key:"sf",icon:"🧾",ru:["Счёт-фактура","Для плательщиков НДС"],kz:["Шот-фактура","ҚҚС төлеушілерге"]}
  ];
  let lang = localStorage.getItem('qujat_weblang') || (navigator.language||'').toLowerCase().startsWith('kk')?'kz':'ru';
  if(lang!=='kz'&&lang!=='ru') lang='ru';
  let curDoc=null, lastUrl=null;
  const $=id=>document.getElementById(id);

  function toggleLang(){ lang=lang==='ru'?'kz':'ru'; localStorage.setItem('qujat_weblang',lang); renderAll(); }

  function renderHome(){
    const s=STR[lang];
    $('h-title').textContent=s.title; $('h-sub').textContent=s.sub; $('h-banner').textContent=s.banner;
    $('h-note').innerHTML=s.note;
    const box=$('cats'); box.innerHTML='';
    CATS.forEach(c=>{
      const[t,d]=c[lang];
      const el=document.createElement('div'); el.className='card';
      el.innerHTML='<div class="ic">'+c.icon+'</div><div><div class="t">'+t+'</div><div class="d">'+d+'</div></div><div class="chev">›</div>';
      el.onclick=()=>openForm(c.key); box.appendChild(el);
    });
  }
  function labels(){
    const s=STR[lang];
    $('langbtn').textContent='🌐 '+(lang==='ru'?'RU':'KZ');
    $('f-back').textContent=s.back; $('s-seller').textContent=s.seller; $('s-buyer').textContent=s.buyer;
    $('s-items').textContent=s.items; $('s-bank').textContent=s.bank;
    $('l-sname').textContent=s.sname; $('l-sbin').textContent=s.sbin; $('l-sfio').textContent=s.sfio;
    $('l-bank').textContent=s.bankname; $('l-kaspi').textContent=s.kaspi;
    $('l-bname').textContent=s.bname; $('l-bbin').textContent=s.bbin;
    $('l-num').textContent=s.num; $('l-date').textContent=s.date;
    $('ih-name').textContent=s.ihname; $('ih-unit').textContent=s.ihunit; $('ih-qty').textContent=s.ihqty;
    $('b-additem').textContent=s.additem; $('l-vat').textContent=s.vat; $('l-total').textContent=s.total;
    $('genbtn').textContent=s.gen; $('f-note').textContent=s.fnote;
    $('r-title').textContent=s.rtitle; $('r-sub').textContent=s.rsub; $('r-open').textContent=s.ropen;
    $('r-download').textContent=s.rdownload; $('r-new').textContent=s.rnew;
  }
  function renderAll(){ renderHome(); labels(); }

  function defUnit(){ return curDoc==='act' ? 'усл.' : 'шт.'; }
  function addItem(name='',qty='1',price=''){
    const s=STR[lang];
    const row=document.createElement('div'); row.className='itemrow';
    row.innerHTML='<input type="text" placeholder="'+s.itemname+'" value="'+name+'">'+
      '<input type="number" inputmode="decimal" value="'+qty+'">'+
      '<input type="number" inputmode="decimal" placeholder="0" value="'+price+'">'+
      '<button class="del">×</button>';
    const ins=row.querySelectorAll('input');
    ins[0].dataset.k='name'; ins[1].dataset.k='qty'; ins[2].dataset.k='price';
    ins[1].addEventListener('input',calcTotal);
    ins[2].addEventListener('input',calcTotal);
    row.querySelector('.del').onclick=()=>{row.remove();calcTotal();};
    $('items').appendChild(row); calcTotal();
  }
  function calcTotal(){
    let sum=0;
    document.querySelectorAll('#items .itemrow').forEach(r=>{
      const q=parseFloat((r.querySelector('[data-k=qty]').value||'0').replace(',','.'))||0;
      const price=parseFloat((r.querySelector('[data-k=price]').value||'0').replace(',','.'))||0;
      sum+=q*price;
    });
    $('total').textContent=sum.toLocaleString('ru-RU')+' ₸';
  }

  function openForm(key){
    curDoc=key; const c=CATS.find(x=>x.key===key);
    $('f-title').textContent=c[lang][0]; $('f-sub').textContent=c[lang][1];
    // профильді localStorage-тан толтыру
    const saved=JSON.parse(localStorage.getItem('qujat_seller')||'{}');
    ['name','bin','fio','bank_name','iik','bik','kaspi_link'].forEach(k=>{ if($('s_'+k))$('s_'+k).value=saved[k]||''; });
    $('b_name').value=''; $('b_bin').value=''; $('d_number').value='1';
    $('d_date').valueAsDate=new Date();
    $('items').innerHTML=''; addItem(); $('d_vat').checked=false;
    $('home').classList.add('hidden'); $('result').classList.add('hidden'); $('form').classList.remove('hidden');
    window.scrollTo(0,0);
  }
  function goHome(){ $('form').classList.add('hidden'); $('result').classList.add('hidden'); $('home').classList.remove('hidden'); window.scrollTo(0,0); }

  function val(id){ return ($(id).value||'').trim(); }
  function fmtDate(){ const d=$('d_date').value; if(!d)return ''; const[y,m,dd]=d.split('-'); return dd+'.'+m+'.'+y; }

  async function generate(){
    const s=STR[lang];
    if(!val('s_name')){ alert(s.errseller); return; }
    const items=[];
    document.querySelectorAll('#items .itemrow').forEach(r=>{
      const name=r.querySelector('[data-k=name]').value.trim();
      const qty=r.querySelector('[data-k=qty]').value||'1';
      const price=r.querySelector('[data-k=price]').value;
      if(name) items.push({name,unit:defUnit(),qty,price});
    });
    if(!items.length){ alert(s.erritems); return; }
    const seller={name:val('s_name'),bin:val('s_bin'),fio:val('s_fio'),
      bank_name:val('s_bank_name'),iik:val('s_iik'),bik:val('s_bik'),kaspi_link:val('s_kaspi_link')};
    localStorage.setItem('qujat_seller',JSON.stringify(seller));
    const payload={doc:curDoc,number:val('d_number'),date:fmtDate(),vat:$('d_vat').checked,
      seller,buyer:{name:val('b_name'),bin:val('b_bin')},items};
    const btn=$('genbtn'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>'+s.genwait;
    try{
      const res=await fetch(API+'/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!res.ok){ throw new Error('http '+res.status); }
      const blob=await res.blob();
      if(lastUrl) URL.revokeObjectURL(lastUrl);
      lastUrl=URL.createObjectURL(blob);
      const fname=curDoc+'_'+(val('d_number')||'1')+'.pdf';
      $('r-open').href=lastUrl;
      $('r-download').href=lastUrl; $('r-download').setAttribute('download',fname);
      $('form').classList.add('hidden'); $('result').classList.remove('hidden'); window.scrollTo(0,0);
    }catch(e){ alert(s.errnet); }
    finally{ btn.disabled=false; btn.textContent=s.gen; }
  }

  renderAll();
</script>
</body>
</html>
