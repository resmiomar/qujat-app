  function cards(items) {
    return items.map(([title, text]) => `<article><h3>${title}</h3><p>${text}</p></article>`).join('');
  }

  function chips(items) {
    return items.map((item) => `<span>${item}</span>`).join('');
  }

  function renderSalesSections(s) {
    return `
      <section class="sales-section pain-section fade-up fade-up-d2" id="problems">
        <div class="sales-copy">
          <span class="section-kicker">${s.painKicker}</span>
          <h2>${s.painTitle}</h2>
          <p>${s.painSub}</p>
        </div>
        <div class="pain-grid">${cards(s.pains)}</div>
      </section>

      <section class="sales-section product-split fade-up fade-up-d2" id="documents">
        <div class="sales-copy">
          <span class="section-kicker">${s.docsKicker}</span>
          <h2>${s.docsTitle}</h2>
          <p>${s.docsSub}</p>
        </div>
        <div class="doc-chip-grid">${chips(s.docs)}</div>
      </section>

      <section class="sales-section tax-section fade-up fade-up-d2" id="taxes">
        <div class="section-head">
          <span>${s.taxesKicker}</span>
          <h2>${s.taxesTitle}</h2>
        </div>
        <p class="section-lead">${s.taxesSub}</p>
        <div class="tax-grid">${cards(s.taxes)}</div>
      </section>

      <section class="sales-section ai-section fade-up fade-up-d3">
        <div class="sales-copy">
          <span class="section-kicker">${s.aiKicker}</span>
          <h2>${s.aiTitle}</h2>
          <p>${s.aiSub}</p>
        </div>
        <div class="prompt-stack">${s.aiPrompts.map((item) => `<span>${item}</span>`).join('')}</div>
      </section>

      <section class="price-section fade-up fade-up-d3" id="price">
        <div>
          <span class="section-kicker">${s.priceKicker}</span>
          <h2>${s.priceTitle}</h2>
          <p>${s.priceSub}</p>
          <button type="button" class="hero-cta price-cta" id="btn-price-cta">${s.priceCta}</button>
        </div>
        <div class="price-list">${chips(s.priceItems)}</div>
      </section>

      <section class="faq-section fade-up fade-up-d3" id="faq">
        <div class="section-head">
          <span>${s.faqKicker}</span>
          <h2>${s.faqTitle}</h2>
        </div>
        <div class="faq-grid">${s.faq.map(([q, a]) => `<article><h3>${q}</h3><p>${a}</p></article>`).join('')}</div>
      </section>
    `;
  }

  function render() {
    const s = COPY[Q.lang()] || COPY.ru;
    document.documentElement.lang = Q.lang() === 'kz' ? 'kk' : Q.lang();
    document.getElementById('nav-features').textContent = s.navFeatures;
    document.getElementById('nav-docs').textContent = s.navDocs;
    document.getElementById('nav-taxes').textContent = s.navTaxes;
    document.getElementById('nav-price').textContent = s.navPrice;
    document.getElementById('nav-faq').textContent = s.navFaq;
    document.getElementById('btn-top-cta').textContent = s.navCta;
    document.getElementById('hero-kicker').textContent = s.kicker;
    document.getElementById('hero-title').textContent = s.title;
    document.getElementById('hero-sub').textContent = s.sub;
    document.getElementById('cta-title').textContent = s.cta;

    document.getElementById('audience-title').textContent = s.audienceTitle;
    document.getElementById('features-kicker').textContent = s.featuresKicker;
    document.getElementById('features-title').textContent = s.featuresTitle;
    document.getElementById('workflow-kicker').textContent = s.workflowKicker;
    document.getElementById('workflow-title').textContent = s.workflowTitle;
    document.getElementById('compare-kicker').textContent = s.compareKicker;
    document.getElementById('compare-title').textContent = s.compareTitle;
    document.getElementById('before-title').textContent = s.beforeTitle;
    document.getElementById('after-title').textContent = s.afterTitle;
    document.getElementById('objection-kicker').textContent = s.objectionKicker;
    document.getElementById('objection-title').textContent = s.objectionTitle;
    document.getElementById('objection-sub').textContent = s.objectionSub;

    document.getElementById('footer').textContent = s.footer;

    document.getElementById('trust-row').innerHTML = s.trusts.map((item) => `<span>${item}</span>`).join('');
    document.getElementById('hero-metrics').innerHTML = s.metrics.map(([num, label]) => `<div><strong>${num}</strong><span>${label}</span></div>`).join('');
    document.getElementById('preview-list').innerHTML = chips(s.previewList);
    document.getElementById('proof-strip').innerHTML = s.proof.map((item) => `<div>${item}</div>`).join('');
    document.getElementById('sales-sections').innerHTML = renderSalesSections(s);
    document.getElementById('btn-price-cta').onclick = () => { location.href = '/app.html'; };
    document.getElementById('audience-grid').innerHTML = s.audience.map(([title, text]) =>
      `<article class="audience-item"><h3>${title}</h3><p>${text}</p></article>`
    ).join('');
    document.getElementById('feature-grid').innerHTML = s.features.map(([title, text]) =>
      `<article class="feature-card"><h3>${title}</h3><p>${text}</p></article>`
    ).join('');
    document.getElementById('steps').innerHTML = s.steps.map(([num, text]) =>
      `<div class="step"><strong>${num}</strong><span>${text}</span></div>`
    ).join('');
    document.getElementById('before-list').innerHTML = s.before.map((item) => `<span>${item}</span>`).join('');
    document.getElementById('after-list').innerHTML = s.after.map((item) => `<span>${item}</span>`).join('');
    document.getElementById('objection-list').innerHTML = s.objections.map((item) => `<span>${item}</span>`).join('');
  }

  window.onLangChange = render;

  document.getElementById('btn-cta').onclick = () => { location.href = '/app.html'; };
  document.getElementById('btn-top-cta').onclick = () => { location.href = '/app.html'; };
  document.getElementById('btn-signup').onclick = () => { location.href = '/auth/?mode=register'; };
  document.getElementById('btn-bottom-cta').onclick = () => { location.href = '/app.html'; };
  document.getElementById('btn-signin').onclick = () => { location.href = '/auth/'; };

  Q.mountLangPill(document.body);
  render();

  (async function boot() {
    if (localStorage.getItem('qujat_token')) {
      const u = await Q.loadMe();
      if (u) location.replace('/app.html');
    }
  })();
