<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Qujat — бухгалтерия РК</title>
<meta name="description" content="Документы, налоги и ИИ-помощник для ИП и ТОО в Казахстане.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="public-ios.css">
</head>
<body>
<div class="lang-fixed">
  <div style="position:relative">
    <button type="button" class="lang-pill" aria-label="Language"><span class="on">RU</span></button>
    <div class="lang-menu" role="menu"></div>
  </div>
</div>

<div class="ios-shell">
  <div class="ios-inner">
    <section class="hero-card fade-up">
      <div class="hero-logo">Qujat</div>
      <h1 class="hero-title" id="hero-title"></h1>
      <p class="hero-sub" id="hero-sub"></p>
    </section>

    <button type="button" class="action-card primary fade-up fade-up-d1" id="btn-cta">
      <div class="ac-body">
        <div class="ac-title" id="cta-title"></div>
        <div class="ac-sub" id="cta-sub"></div>
      </div>
      <span class="chev" aria-hidden="true">›</span>
    </button>

    <div class="card-stack fade-up fade-up-d2">
      <button type="button" class="action-card" id="btn-signin">
        <div class="ac-body">
          <div class="ac-title dark" id="signin-title"></div>
          <div class="ac-sub" id="signin-sub"></div>
        </div>
        <span class="chev" aria-hidden="true">›</span>
      </button>
      <button type="button" class="action-card" id="btn-signup">
        <div class="ac-body">
          <div class="ac-title dark" id="signup-title"></div>
          <div class="ac-sub" id="signup-sub"></div>
        </div>
        <span class="chev" aria-hidden="true">›</span>
      </button>
    </div>

    <footer class="ios-footer fade-up fade-up-d3" id="footer"></footer>
  </div>
</div>

<script src="public-core.js"></script>
<script>
(function () {
  const Q = window.QujatPublic;

  function render() {
    const s = Q.S();
    document.getElementById('hero-title').textContent = s.heroTitle;
    document.getElementById('hero-sub').textContent = s.heroSub;
    document.getElementById('cta-title').textContent = s.ctaTitle;
    document.getElementById('cta-sub').textContent = s.ctaSub;
    document.getElementById('signin-title').textContent = s.signInTitle;
    document.getElementById('signin-sub').textContent = s.signInSub;
    document.getElementById('signup-title').textContent = s.signUpTitle;
    document.getElementById('signup-sub').textContent = s.signUpSub;
    document.getElementById('footer').textContent = s.footer;
  }

  window.onLangChange = render;

  document.getElementById('btn-cta').onclick = () => { location.href = '/app.html'; };
  document.getElementById('btn-signin').onclick = () => { location.href = '/auth/'; };
  document.getElementById('btn-signup').onclick = () => { location.href = '/auth/?mode=register'; };

  Q.mountLangPill(document.body);
  render();

  (async function boot() {
    if (localStorage.getItem('qujat_token')) {
      const u = await Q.loadMe();
      if (u) location.replace('/app.html');
    }
  })();
})();
</script>
</body>
</html>
