<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Qujat — документы, налоги, ИИ онлайн</title>
<meta name="description" content="Бухгалтерия Казахстана онлайн: создавайте счёт, акт, накладную, считайте налоги 2026 и спрашивайте ИИ-помощника — прямо в браузере, бесплатно.">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f8fb;
  --bg-soft:#fbfcfd;
  --card:#ffffff;
  --surface-2:#f8fafc;
  --text:#0f172a;
  --text-2:#334155;
  --muted:#64748b;
  --muted-2:#94a3b8;
  --accent:#5e17eb;
  --accent-ink:#5314d4;
  --accent-strong:#4c12bf;
  --accent-deep:#4410aa;
  --accent-soft:#f0ebfd;
  --accent-soft2:#e3d7fc;
  --accent-tint:#f7f2ff;
  --accent2:#0fb886;
  --accent2-soft:#e6f7f1;
  --grad:linear-gradient(135deg,#7a3ef0 0%,#5e17eb 52%,#520fdb 100%);
  --grad-soft:linear-gradient(155deg,#f3edff 0%,#e8ddff 100%);
  --line:#e6eaf0;
  --line-2:#dbe1ea;
  --line-soft:#f1f5f9;
  --danger:#e5484d;
  --danger-soft:#fdecee;
  --ok:#0a9d6e;
  --ok-soft:#e7f7f0;
  --ok-line:#bfe9d4;
  --radius:18px;
  --radius-lg:20px;
  --radius-sm:13px;
  --radius-xs:11px;
  --sh-xs:0 1px 2px rgba(16,18,28,.04), 0 1px 1px rgba(16,18,28,.03);
  --sh-sm:0 1px 2px rgba(16,18,28,.05), 0 4px 10px rgba(16,18,28,.05);
  --sh-md:0 2px 4px rgba(16,18,28,.05), 0 10px 26px rgba(40,32,90,.08);
  --sh-lg:0 6px 14px rgba(40,32,90,.10), 0 20px 44px rgba(40,32,90,.14);
  --sh-accent:0 4px 12px rgba(94,23,235,.28), 0 12px 30px rgba(94,23,235,.22);
  --sh-accent-soft:0 2px 8px rgba(94,23,235,.14), 0 10px 28px rgba(94,23,235,.12);
  --ring:0 0 0 4px rgba(94,23,235,.13);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
*::selection{background:var(--accent-soft);color:var(--accent-strong)}
body{
  font-family:'Montserrat',-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
  font-feature-settings:"cv11","ss01";
  font-variant-numeric:tabular-nums;
  background:var(--bg);
  background-attachment:fixed;
  color:var(--text);
  line-height:1.5;
  letter-spacing:-.011em;
  font-weight:450;
  padding-bottom:calc(112px + env(safe-area-inset-bottom,0px));
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
.wrap{max-width:580px;margin:0 auto;padding:0 18px}

header{
  position:sticky;top:0;z-index:30;
  background:rgba(247,248,251,.74);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-bottom:1px solid var(--line);
}
header .wrap{display:flex;align-items:center;justify-content:space-between;height:60px;gap:10px}
.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ib-logout{color:var(--danger);border-color:#f3c0c0;font-weight:700;white-space:nowrap}
.logo{
  font-size:21px;font-weight:800;letter-spacing:-.03em;
  display:flex;gap:8px;align-items:center;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.logo svg,.logo img{height:26px;width:auto}
.ib{
  height:40px;padding:0 15px;border-radius:13px;
  background:var(--card);border:1px solid var(--line-2);
  font-family:inherit;font-weight:700;font-size:13.5px;letter-spacing:.01em;
  color:var(--text-2);cursor:pointer;
  box-shadow:var(--sh-xs);
  transition:transform .18s var(--ease),box-shadow .18s var(--ease),border-color .18s var(--ease),color .18s var(--ease);
}
.ib:hover{border-color:#d6d7e0;color:var(--text);box-shadow:var(--sh-sm);transform:translateY(-1px)}
.ib:active{transform:translateY(0) scale(.97)}

h2{font-size:25px;font-weight:800;letter-spacing:-.035em;margin:24px 0 5px;line-height:1.15}
.sub{color:var(--muted);font-size:14.5px;font-weight:500;letter-spacing:-.005em;margin-bottom:20px;line-height:1.45}

.card{
  display:flex;align-items:center;gap:14px;
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);padding:15px 16px;margin-bottom:11px;
  cursor:pointer;position:relative;
  box-shadow:var(--sh-xs);
  transition:transform .2s var(--ease),box-shadow .25s var(--ease),border-color .2s var(--ease);
}
.card:hover{
  border-color:rgba(94,23,235,.28);
  transform:translateY(-3px);
  box-shadow:var(--sh-md);
}
.card:active{transform:translateY(-1px) scale(.995)}
/* Блок-панель (Учёт, Админ бөлімдері — тік орналасу) */
.pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--sh-xs)}
.pcard>h3{font-size:15px;font-weight:800;letter-spacing:-.01em;color:var(--text);margin-bottom:10px}
.cp-row{padding:11px 13px;border-radius:12px;font-size:14px;margin-bottom:7px;line-height:1.38;display:flex;align-items:center;gap:8px}
.cp-row .iic{margin-top:0}
.cp-green{background:#eaf7ee;color:#1a7f37;border:1px solid #c3e9cf}
.cp-red{background:var(--danger-soft,#fdecee);color:var(--danger,#e5484d);border:1px solid #f3c9cb}
.cp-wait{background:var(--accent-soft,#f0ebfd);color:var(--accent-strong,#4a11c0);border:1px solid #e3d7fc}
.cp-bad{background:#fff4e5;color:#b25b00;border:1px solid #ffd9a8}
.ic{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:23px;
  background:var(--grad-soft);color:var(--accent);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7),inset 0 0 0 1px rgba(94,23,235,.08),0 4px 10px rgba(94,23,235,.10);
  flex:0 0 auto;
}
.card .t{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1.25}
.card .d{font-size:12.5px;font-weight:500;color:var(--muted);letter-spacing:-.005em;margin-top:2px;line-height:1.35}
.chev{
  margin-left:auto;color:var(--muted-2);font-size:20px;font-weight:700;flex:0 0 auto;
  transition:transform .2s var(--ease),color .2s var(--ease);
}
.card:hover .chev{color:var(--accent);transform:translateX(3px)}

.cgh{
  font-size:11.5px;font-weight:800;color:var(--muted);
  letter-spacing:.14em;text-transform:uppercase;margin:26px 4px 11px;
}

/* Басты бет (dashboard) */
.hgreet{font-size:26px;font-weight:800;letter-spacing:-.03em;color:var(--text);margin:2px 0 3px;line-height:1.15}
.hsnap{display:flex;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 4px;margin:16px 0 2px;box-shadow:var(--sh-xs)}
.hsnap>div{flex:1;text-align:center;padding:0 8px;min-width:0}
.hsnap>div+div{border-left:1px solid var(--line-soft)}
.hsnap b{display:block;font-size:16px;font-weight:800;letter-spacing:-.02em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hsnap .up b{color:var(--accent-strong)}
.hsnap span{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-h{font-size:11.5px;font-weight:800;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin:24px 4px 12px}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.qa{display:flex;flex-direction:column;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px;cursor:pointer;box-shadow:var(--sh-xs);transition:transform .2s var(--ease),box-shadow .25s var(--ease),border-color .2s var(--ease)}
.qa:hover{border-color:rgba(94,23,235,.28);transform:translateY(-3px);box-shadow:var(--sh-md)}
.qa:active{transform:translateY(-1px) scale(.995)}
.qa .qic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:var(--grad-soft);color:var(--accent);box-shadow:inset 0 1px 0 rgba(255,255,255,.7),inset 0 0 0 1px rgba(94,23,235,.08),0 4px 10px rgba(94,23,235,.10)}
.qa .qic svg{width:22px;height:22px}
.qa .qt{font-size:14.5px;font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1.2}
.qa .qd{font-size:11.5px;font-weight:500;color:var(--muted);margin-top:-5px;line-height:1.3}

.field{margin-bottom:14px}
label{
  display:block;font-size:12.5px;font-weight:700;color:var(--text-2);
  letter-spacing:-.005em;margin:0 0 6px 3px;
}
input[type=text],input[type=number],input[type=date],input[type=email],input[type=password]{
  width:100%;height:48px;
  border:1px solid var(--line-2);border-radius:13px;
  padding:0 14px;font-family:inherit;font-size:15px;font-weight:600;letter-spacing:-.01em;
  background:var(--surface-2);color:var(--text);
  transition:border-color .18s var(--ease),box-shadow .18s var(--ease),background .18s var(--ease);
}
input::placeholder{color:var(--muted-2);font-weight:500}
input[type=text]:hover,input[type=number]:hover,input[type=date]:hover,input[type=email]:hover,input[type=password]:hover{border-color:#d6d7e0}
input:focus{
  outline:none;border-color:var(--accent);background:var(--card);
  box-shadow:var(--ring);
}
input.bad,input.bad:focus{border-color:var(--danger);background:var(--danger-soft);box-shadow:0 0 0 4px rgba(229,72,77,.13)}
.ifield{position:relative}
.ifield>svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted-2);pointer-events:none;transition:color .18s var(--ease)}
.ifield input{padding-left:42px}
.ifield:focus-within>svg{color:var(--accent)}

.sec{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);padding:17px 16px;margin-bottom:15px;
  box-shadow:var(--sh-sm);
}
.sec h3{
  font-size:15px;font-weight:800;letter-spacing:-.02em;
  margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--text);
}
/* Бүктелетін профиль бөлімдері (аккордеон) */
.afold>summary{list-style:none;cursor:pointer;font-size:15px;font-weight:800;letter-spacing:-.02em;color:var(--text);display:flex;align-items:center;gap:9px;user-select:none}
.afold>summary::-webkit-details-marker{display:none}
.afold>summary::after{content:none;display:none}
.afold>summary .fchev{margin-left:auto;color:var(--muted-2);font-size:20px;font-weight:700;transition:transform .22s var(--ease)}
.afold[open]>summary .fchev{transform:rotate(90deg);color:var(--accent)}
.afold[open]>summary{margin-bottom:14px}
.afold[open]{border-color:rgba(94,23,235,.25)}
.fic{width:19px;height:19px;color:var(--accent);flex:none}
.iic{width:18px;height:18px;flex:none;vertical-align:-4px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

.itemrow{display:grid;grid-template-columns:1fr 50px 82px 32px;gap:8px;margin-bottom:9px;align-items:center}
.itemrow input{height:44px;padding:0 10px;font-size:14px;border-radius:11px}
.del{
  height:44px;border:1px solid var(--danger-soft);background:var(--danger-soft);
  color:var(--danger);border-radius:11px;font-size:17px;cursor:pointer;font-family:inherit;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s var(--ease),transform .12s var(--ease),box-shadow .15s var(--ease);
}
.del:hover{background:#fbdbde;box-shadow:0 2px 8px rgba(229,72,77,.18)}
.del:active{transform:scale(.92)}
.additem{
  width:100%;height:46px;
  border:1.5px dashed rgba(94,23,235,.42);background:var(--grad-soft);color:var(--accent-strong);
  border-radius:13px;font-family:inherit;font-weight:700;font-size:14px;letter-spacing:-.01em;cursor:pointer;
  transition:background .18s var(--ease),border-color .18s var(--ease),box-shadow .18s var(--ease),transform .12s var(--ease);
}
.additem:hover{border-color:var(--accent);box-shadow:0 6px 16px rgba(94,23,235,.14)}
.additem:active{transform:scale(.985)}
.ihead{
  display:grid;grid-template-columns:1fr 50px 82px 32px;gap:8px;
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted-2);margin-bottom:7px;padding:0 4px;
}

details summary{
  cursor:pointer;font-size:13.5px;color:var(--accent);font-weight:700;letter-spacing:-.01em;
  margin-top:6px;list-style:none;display:inline-flex;align-items:center;gap:5px;
  transition:color .15s var(--ease);
}
details summary::-webkit-details-marker{display:none}
details summary::after{content:"\2304";font-size:15px;line-height:1;transition:transform .2s var(--ease)}
details[open] summary::after{transform:rotate(180deg)}
details summary:hover{color:var(--accent-strong)}

.total{
  display:flex;justify-content:space-between;align-items:center;
  font-size:18px;font-weight:800;letter-spacing:-.025em;
  padding:14px;margin-top:4px;border-radius:14px;
  background:var(--grad-soft);
  box-shadow:inset 0 0 0 1px rgba(94,23,235,.10);
}

.chk{
  display:flex;align-items:center;gap:10px;
  font-size:14.5px;font-weight:600;letter-spacing:-.01em;color:var(--text-2);
  cursor:pointer;padding:7px 3px;
}
.chk input{
  width:21px;height:21px;border-radius:7px;accent-color:var(--accent);cursor:pointer;flex:0 0 auto;
}

.btn{
  width:100%;height:54px;
  background:var(--grad);color:#fff;border:none;border-radius:15px;
  font-family:inherit;font-size:16px;font-weight:700;letter-spacing:-.01em;cursor:pointer;
  box-shadow:var(--sh-accent-soft), inset 0 1px 0 rgba(255,255,255,.22);
  transition:transform .16s var(--ease),box-shadow .22s var(--ease),filter .18s var(--ease);
}
.btn:hover{transform:translateY(-2px);box-shadow:var(--sh-accent), inset 0 1px 0 rgba(255,255,255,.25);filter:saturate(1.05)}
.btn:active{transform:translateY(0) scale(.985);box-shadow:var(--sh-accent-soft)}
.btn:disabled{opacity:.55;cursor:not-allowed;box-shadow:none;filter:grayscale(.12);transform:none}
.btn.ghost{
  background:var(--card);color:var(--accent-strong);
  border:1px solid var(--line-2);
  box-shadow:var(--sh-xs);
}
.btn.ghost:hover{border-color:rgba(94,23,235,.4);background:var(--accent-tint);box-shadow:var(--sh-sm);filter:none;transform:none}

.back{
  background:none;border:none;color:var(--muted);
  font-family:inherit;font-size:14.5px;font-weight:700;letter-spacing:-.01em;cursor:pointer;
  padding:16px 0 6px;display:inline-flex;align-items:center;gap:4px;
  transition:color .15s var(--ease),transform .15s var(--ease);
}
.back:hover{color:var(--accent-strong);transform:translateX(-2px)}

.hidden{display:none}

.note{font-size:12.5px;font-weight:500;color:var(--muted);text-align:center;margin:18px 0;line-height:1.6}
.note a{color:var(--accent-strong);font-weight:700;text-decoration:none;border-bottom:1px solid rgba(94,23,235,.25)}
.note a:hover{border-bottom-color:var(--accent)}

.ok{text-align:center;padding:42px 12px;animation:rise .5s var(--ease)}
.ok .em{
  font-size:60px;display:inline-flex;align-items:center;justify-content:center;
  width:104px;height:104px;border-radius:50%;margin-bottom:6px;
  background:var(--ok-soft);box-shadow:0 10px 28px rgba(10,157,110,.18);
  animation:pop .5s var(--ease);
}
.ok h2{margin:16px 0 6px}

.spin{
  display:inline-block;width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;
  animation:sp .7s linear infinite;vertical-align:-3px;margin-right:9px;
}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.6)}60%{transform:scale(1.08)}100%{transform:scale(1)}}

.banner{
  background:linear-gradient(135deg,#eafaf2,var(--ok-soft));
  border:1px solid var(--ok-line);color:#0a7a52;
  border-radius:14px;padding:13px 15px;font-size:13px;font-weight:600;letter-spacing:-.005em;line-height:1.5;
  margin-bottom:18px;box-shadow:0 4px 14px rgba(10,157,110,.08);
}

.rline{
  display:flex;justify-content:space-between;gap:10px;align-items:center;
  padding:13px 4px;border-bottom:1px solid var(--line);
  font-size:15px;font-weight:500;letter-spacing:-.01em;color:var(--text-2);
}
.rline:last-child{border:none}
.rline b{font-weight:800;color:var(--text);letter-spacing:-.02em}

.chat{display:flex;flex-direction:column;gap:11px;padding:10px 0 14px;min-height:50vh}
.msg{
  max-width:86%;padding:12px 15px;border-radius:18px;
  font-size:14.5px;font-weight:500;letter-spacing:-.005em;line-height:1.55;white-space:pre-wrap;
  box-shadow:var(--sh-xs);animation:rise .35s var(--ease);
}
.msg.u{
  background:var(--grad);color:#fff;
  align-self:flex-end;border-bottom-right-radius:6px;
  box-shadow:var(--sh-accent-soft);
}
.msg.a{
  background:var(--card);border:1px solid var(--line);color:var(--text);
  align-self:flex-start;border-bottom-left-radius:6px;
}

.airow{
  position:fixed;bottom:calc(94px + env(safe-area-inset-bottom,0px));left:0;right:0;z-index:35;
  background:rgba(247,248,251,.84);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-top:1px solid var(--line);padding:11px 0 12px;
}
.airow .wrap{display:flex;gap:9px;align-items:center}
.airow input{flex:1;height:48px;background:var(--card);box-shadow:var(--sh-xs)}
.aisend{
  width:50px;height:48px;border:none;flex:0 0 auto;
  background:var(--grad);color:#fff;border-radius:13px;font-size:19px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--sh-accent-soft);
  transition:transform .14s var(--ease),box-shadow .2s var(--ease),filter .18s var(--ease);
}
.aisend:hover{transform:translateY(-1px);box-shadow:var(--sh-accent);filter:saturate(1.05)}
.aisend:active{transform:scale(.93)}

.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.chip{
  background:var(--card);border:1px solid var(--line-2);border-radius:999px;
  padding:8px 14px;font-family:inherit;font-size:12.5px;font-weight:700;letter-spacing:-.005em;
  cursor:pointer;color:var(--accent-strong);
  box-shadow:var(--sh-xs);
  transition:background .15s var(--ease),border-color .15s var(--ease),box-shadow .15s var(--ease),transform .12s var(--ease);
}
.chip:hover{background:var(--accent-tint);border-color:rgba(94,23,235,.4);box-shadow:var(--sh-sm);transform:translateY(-1px)}
.chip:active{transform:scale(.95)}

/* Қалқыма «pill» навигация: белсенді таб — толтырылған бейдж-иконка */
.nav{
  position:fixed;left:14px;right:14px;bottom:calc(10px + env(safe-area-inset-bottom,0px));z-index:40;
  height:auto;
  background:#fff;
  border:1px solid var(--line-soft);
  border-radius:24px;
  box-shadow:0 10px 34px rgba(40,32,90,.16),0 2px 8px rgba(40,32,90,.05);
  display:flex;align-items:center;justify-content:space-around;
  padding:8px 6px;gap:2px;
}
.nav button{
  position:relative;flex:1;background:none;border:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  color:var(--muted-2);font-family:inherit;cursor:pointer;padding:2px 0;
  transition:transform .14s var(--ease);
}
.nav button:active{transform:scale(.92)}
.nav .ni{
  display:flex;align-items:center;justify-content:center;
  width:44px;height:36px;border-radius:13px;color:var(--muted-2);
  transition:background .26s var(--ease),color .2s var(--ease),box-shadow .26s var(--ease);
}
.nav .ni svg{width:23px;height:23px;display:block}

  async function generate(){
    const s=S();
    if(!val('s_name')){markBad('s_name');return;}
    if(val('s_bin')&&!/^[0-9]{12}$/.test(val('s_bin'))){markBad('s_bin');return;}
    if(val('b_bin')&&!/^[0-9]{12}$/.test(val('b_bin'))){markBad('b_bin');return;}
    const items=[];document.querySelectorAll('#items .itemrow').forEach(r=>{
      const name=r.querySelector('[data-k=name]').value.trim();
      const qty=r.querySelector('[data-k=qty]').value||'1';const price=r.querySelector('[data-k=price]').value;
      if(name)items.push({name,unit:defUnit(),qty,price});});
    if(!items.length){const f=document.querySelector('#items .itemrow [data-k=name]');if(f){f.classList.add('bad');f.scrollIntoView({behavior:'smooth',block:'center'});try{f.focus();}catch(e){}}return;}
    const seller={name:val('s_name'),bin:val('s_bin'),fio:val('s_fio'),bank_name:val('s_bank_name'),iik:val('s_iik'),bik:val('s_bik'),kaspi_link:val('s_kaspi_link')};
    localStorage.setItem('qujat_seller',JSON.stringify(seller));
    const payload={doc:curDoc,number:val('d_number'),date:fmtDate(),vat:$('d_vat').checked,seller,buyer:{name:val('b_name'),bin:val('b_bin')},items};
    const btn=$('genbtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>'+s.genwait;
    try{
      const res=await afetch(API+'/api/generate',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(res.status===402){openPro(S().prolimit);return;}
      if(!res.ok)throw new Error('http');
      const blob=await res.blob();if(lastUrl)URL.revokeObjectURL(lastUrl);lastUrl=URL.createObjectURL(blob);
      const fn=curDoc+'_'+(val('d_number')||'1')+'.pdf';lastBlob=blob;lastFn=fn;showShareBtn();$('r-open').href=lastUrl;$('r-download').href=lastUrl;$('r-download').setAttribute('download',fn);
      $('form').classList.add('hidden');$('result').classList.remove('hidden');window.scrollTo(0,0);
    }catch(e){alert(s.errnet);}finally{btn.disabled=false;btn.textContent=s.gen;}
  }

  async function genXDoc(){

    localStorage.setItem('qujat_seller',JSON.stringify(seller));

      vals[i.dataset.k]=(i.type==='checkbox')?i.checked:i.value;});

      const rows=[];w.querySelectorAll('.xrow').forEach(r=>{const o={};

        if(Object.values(o).some(v=>String(v).trim()))rows.push(o);});

  function renderCpResult(d,s){

    }else{h+=_cpRow('cp-wait',sic('clock')+s.cpConnecting);}
    const e=d.enforcement;
    if(e&&e.checked){
      if(e.in_registry||e.has_arrest){
        const p=[];if(e.in_registry)p.push(s.cpInReg+(e.cases?(' ('+e.cases+')'):''));if(e.has_arrest)p.push(s.cpArrest);if(e.has_exit_ban)p.push(s.cpExit);

  async function enablePush(){
    const s=S();
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){alert(s.pushUnsupported);return;}
    try{
      const perm=await Notification.requestPermission();
      if(perm!=='granted'){alert(s.pushDenied);return;}
      const key=(await (await afetch(API+'/api/push/public-key')).json()).key;
      if(!key){alert(s.pushNotConfigured);return;}
      const reg=await navigator.serviceWorker.register('/sw.js');
      await navigator.serviceWorker.ready;
      const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToU8(key)});
      const j=sub.toJSON();
      await afetch(API+'/api/push/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:j.endpoint,keys:j.keys})});
      try{await afetch(API+'/api/push/test',{method:'POST'});}catch(_){}
      alert(s.pushOn);
    }catch(e){alert(s.errnet);}
  }

      if(!r.ok){alert(S().errnet);return;}
      const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement('a');
      a.href=u;a.download='qujat-uchet'+(ym?'-'+ym:'')+'.xlsx';document.body.appendChild(a);a.click();a.remove();
      setTimeout(()=>URL.revokeObjectURL(u),1000);
    }catch(e){alert(S().errnet);}

  let finImportItems=[];

  async function onFinImportFile(){
    const f=$('fin-import-file').files[0];if(!f)return;const s=S();
    const btn=$('fin-import-btn');btn.disabled=true;btn.textContent='⏳ …';
    try{
      const fd=new FormData();fd.append('file',f);
      const d=await (await afetch(API+'/api/fin/import',{method:'POST',body:fd})).json();
      finImportItems=d.items||[];const box=$('fin-import-preview');box.className='';
      if(!finImportItems.length){box.innerHTML='<p class="sub">'+s.finImportNone+'</p>';}
      else{
        const rows=finImportItems.slice(0,12).map(function(t){return '<div class="fin-cal-i"><span>'+t.date+' · '+(t.category||'')+'</span><b style="color:'+(t.kind==='in'?'#0a9d6e':'#e5484d')+'">'+(t.kind==='in'?'+':'−')+finM(t.amount)+' ₸</b></div>';}).join('');
        box.innerHTML='<p class="sub" style="font-weight:700">'+s.finImportFound+' '+finImportItems.length+'</p>'+rows+(finImportItems.length>12?'<p class="sub">…+'+(finImportItems.length-12)+'</p>':'')+'<button class="btn" style="margin-top:10px" onclick="finImportCommit()">'+s.finImportAdd+' ('+finImportItems.length+')</button>';
      }
    }catch(e){alert(s.errnet);}finally{btn.disabled=false;$('fin-import-btn').textContent=s.finImport;$('fin-import-file').value='';}

<script>
  // Қолжетімділік: onclick-тегі div-терді клавиатурадан басуға болатын ету (Enter/Space).
  (function(){
    function enhance(root){
      (root.querySelectorAll?root.querySelectorAll('div[onclick]'):[]).forEach(function(el){
        if(el.getAttribute('role'))return;
        el.setAttribute('role','button');
        if(!el.hasAttribute('tabindex'))el.setAttribute('tabindex','0');
      });
    }
    document.addEventListener('keydown',function(e){
      if(e.key!=='Enter'&&e.key!==' ')return;
      var el=document.activeElement;
      if(el&&el.tagName==='DIV'&&el.getAttribute('role')==='button'){
        e.preventDefault();el.click();
      }
    });
    enhance(document);
    try{new MutationObserver(function(muts){
      muts.forEach(function(m){m.addedNodes&&m.addedNodes.forEach(function(n){
        if(n.nodeType===1)enhance(n);});});
    }).observe(document.body,{childList:true,subtree:true});}catch(e){}
  })();
</script>
